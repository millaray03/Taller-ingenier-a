version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: taller_mysql_db
    restart: always
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_USER: "admin"
      MYSQL_PASSWORD: "1234"
      MYSQL_DATABASE: "biblioteca_db"
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  mysql-data: